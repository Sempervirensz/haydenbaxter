<!--
  STYLE: A8 — FLOPPY DISK LABEL (80s Office / Utilitarian)

  DESIGN SPEC — feed this to any project to recreate the nav:

  VIBE:
    80s office ephemera. Floppy disk adhesive label on dark stock.
    Double-border construction, wider buttons, nearly square corners.
    Utilitarian, flat, no-nonsense. IBM-era institutional feel.

  FONT:
    "IBM Plex Mono" (Google Fonts), monospace fallback.
    9.5px, weight 500, letter-spacing 0.2em, uppercase.

  COLORS:
    Page background: #000000
    Button face: #1b1b1b (flat, no gradient)
    Button outer border: 1.5px solid rgba(255,255,255,0.1)
    Button inset ring: inset 0 0 0 1.5px rgba(255,255,255,0.035)
      (this double-border is the key — outer border + inset ring = floppy label edge)
    Button text: rgba(255,255,255,0.66)
    CTA face: #242424 (slightly lighter)
    CTA border: rgba(255,255,255,0.16)
    CTA text: rgba(255,255,255,0.8)
    Depth edge: #0a0a0a

  3D / DEPTH:
    - Double border: 1.5px outer + 1.5px inset ring shadow
    - Inset top shadow: inset 0 1px 2px rgba(0,0,0,0.5)
    - Hard depth edge: 0 2.5px 0 #0a0a0a
    - Soft ambient: 0 3.5px 6px rgba(0,0,0,0.8)
    - Text shadow: 0.3px 0.2px 0 rgba(0,0,0,0.5) (slight ink offset)

  TEXTURE:
    Fine grain via ::before pseudo-element:
    repeating-conic-gradient at 2px, 5% opacity, mix-blend-mode: overlay

  INTERACTIONS:
    Hover: lift 2px, depth edge grows to 4.5px, text brightens to 0.82,
           border brightens to 0.16
    Active: press DOWN 1.5px, depth collapses, deeper inset, border dims.
            40ms snap transition.
    Focus-visible: 2px white ring at 14% opacity

  IMPERFECTION:
    Per-button CSS custom properties:
    --r (rotation ±0.25–0.6deg), --y (vertical offset ±0–1.5px),
    --o (opacity 0.9–1.0). Subtle misregistration.

  SIZING:
    Padding: 7px 17px 6px (nav), 7px 20px 6px (CTA)
    Border-radius: 1px (nearly square — critical to the floppy label feel)
    Border-width: 1.5px (thicker than usual)
    Gap between buttons: 10px

  LAYOUT:
    Flexbox row. Wordmark left (margin-right: auto), nav buttons right.
    Max-width ~1100–1200px centered container. Top padding ~32px.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Floppy Disk Nav</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    min-height: 100vh;
    color: #fff;
    font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 48px 0;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .wordmark {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
    margin-right: auto;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ---- BUTTON ---- */
  .btn {
    all: unset;
    cursor: pointer;
    display: inline-block;
    position: relative;
    font-family: "IBM Plex Mono", monospace;
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    line-height: 1;
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    color: rgba(255,255,255,0.66);
    padding: 7px 17px 6px;
    border-radius: 1px;
    background: #1b1b1b;
    border: 1.5px solid rgba(255,255,255,0.1);
    box-shadow:
      inset 0 0 0 1.5px rgba(255,255,255,0.035),
      inset 0 1px 2px rgba(0,0,0,0.5),
      0 2.5px 0 #0a0a0a,
      0 3.5px 6px rgba(0,0,0,0.8);
    text-shadow: 0.3px 0.2px 0 rgba(0,0,0,0.5);
    transition: transform 110ms ease, box-shadow 110ms ease, color 150ms ease;
    transform: rotate(var(--r,0deg)) translateY(var(--y,0px));
    opacity: var(--o,1);
  }

  .btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: 0.05;
    background: repeating-conic-gradient(rgba(255,255,255,1) 0% 25%, transparent 0% 50%);
    background-size: 2px 2px;
    mix-blend-mode: overlay;
  }

  .btn:hover {
    color: rgba(255,255,255,0.82);
    border-color: rgba(255,255,255,0.16);
    transform: rotate(var(--r,0deg)) translateY(calc(var(--y,0px) - 2px));
    box-shadow:
      inset 0 0 0 1.5px rgba(255,255,255,0.05),
      inset 0 1px 2px rgba(0,0,0,0.4),
      0 4.5px 0 #0a0a0a,
      0 5.5px 9px rgba(0,0,0,0.85);
  }

  .btn:active {
    color: rgba(255,255,255,0.45);
    border-color: rgba(255,255,255,0.07);
    transform: rotate(var(--r,0deg)) translateY(calc(var(--y,0px) + 1.5px));
    box-shadow:
      inset 0 0 0 1.5px rgba(255,255,255,0.02),
      inset 0 2px 3px rgba(0,0,0,0.65),
      0 0 0 #0a0a0a,
      0 1px 2px rgba(0,0,0,0.5);
    transition-duration: 40ms;
  }

  .btn:focus-visible {
    outline: none;
    box-shadow:
      inset 0 0 0 1.5px rgba(255,255,255,0.035),
      0 2.5px 0 #0a0a0a,
      0 0 0 2px rgba(255,255,255,0.14);
  }

  .btn--cta {
    background: #242424;
    border-color: rgba(255,255,255,0.16);
    color: rgba(255,255,255,0.8);
    padding: 7px 20px 6px;
  }

  /* per-button imperfection */
  .btn:nth-child(1) { --r: 0.35deg;  --y:-0.5px;  --o: 0.95; }
  .btn:nth-child(2) { --r:-0.45deg;  --y: 1px;    --o: 0.9;  }
  .btn:nth-child(3) { --r: 0.6deg;   --y: 0px;    --o: 0.94; }
  .btn:nth-child(4) { --r:-0.4deg;   --y: 1.5px;  --o: 0.97; }
  .btn:nth-child(5) { --r:-0.25deg;  --y:-1px; }

  /* ---- HERO (context) ---- */
  .hero {
    max-width: 1200px;
    margin: 0 auto;
    padding: 120px 48px 0;
    text-align: center;
  }
  .hero__sub {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    margin-bottom: 32px;
  }
  .hero__heading {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    font-size: clamp(38px, 6.5vw, 80px);
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: #fff;
    max-width: 820px;
    margin: 0 auto;
  }

  @media (max-width: 680px) {
    .header { padding: 24px 24px 0; flex-wrap: wrap; }
    .wordmark { margin-right: 0; flex-basis: 100%; margin-bottom: 8px; }
    .nav { gap: 8px; flex-wrap: wrap; }
    .hero { padding: 80px 24px 0; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="wordmark">Hayden Baxter</div>
  <nav class="nav" aria-label="Main navigation">
    <button class="btn" type="button">Work</button>
    <button class="btn" type="button">About</button>
    <button class="btn" type="button">Contact</button>
    <button class="btn" type="button">Resume</button>
    <button class="btn btn--cta" type="button">Book a Call</button>
  </nav>
</header>

<section class="hero">
  <p class="hero__sub">I'm Hayden &mdash; founder &amp; product builder.</p>
  <h1 class="hero__heading">I build thoughtful products where data, design, and the human experience converge.</h1>
</section>

</body>
</html>
