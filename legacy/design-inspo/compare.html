<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A / B / C Compare</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    min-height: 100vh;
    font-family: "Inter", sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #fff;
  }

  /* ============================================
     SHARED SECTION FRAME
     ============================================ */
  .section {
    max-width: 1100px;
    margin: 0 auto;
    padding: 48px 48px 56px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .section:last-child { border-bottom: none; }

  .section__label {
    font-size: 10px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    margin-bottom: 28px;
    font-weight: 500;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .wordmark {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
    margin-right: auto;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ============================================

     A — LABEL MAKER
     Embossed DYMO / P-Touch strip on black.
     Flat matte plastic, debossed text, tight condensed caps.

     ============================================ */
  .a-btn {
    all: unset;
    cursor: pointer;
    display: inline-block;
    position: relative;
    font-family: "DM Mono", "Courier New", monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    line-height: 1;
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    color: rgba(255,255,255,0.68);
    padding: 6px 13px 5px;
    border-radius: 3px;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.05);
    /* debossed: inset shadow on top, hard edge below */
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.6),
      inset 0 -1px 0 rgba(255,255,255,0.03),
      0 2px 0 #0c0c0c,
      0 3px 5px rgba(0,0,0,0.8);
    /* ink misregistration */
    text-shadow:
      0.5px 0 0 rgba(255,255,255,0.04),
      -0.3px 0 0 rgba(255,255,255,0.02);
    transition:
      transform 120ms ease,
      box-shadow 120ms ease,
      color 160ms ease;
    transform:
      rotate(var(--r, 0deg))
      translateY(var(--y, 0px));
    opacity: var(--o, 1);
  }

  /* plastic scuff texture */
  .a-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: 0.07;
    background-image:
      repeating-conic-gradient(
        rgba(255,255,255,1) 0% 25%,
        transparent 0% 50%
      );
    background-size: 2px 2px;
    mix-blend-mode: overlay;
  }

  .a-btn:hover {
    color: rgba(255,255,255,0.85);
    transform: rotate(var(--r, 0deg)) translateY(calc(var(--y, 0px) - 2px));
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.5),
      inset 0 -1px 0 rgba(255,255,255,0.04),
      0 4px 0 #0c0c0c,
      0 5px 8px rgba(0,0,0,0.9);
  }

  .a-btn:active {
    color: rgba(255,255,255,0.55);
    transform: rotate(var(--r, 0deg)) translateY(calc(var(--y, 0px) + 1.5px));
    box-shadow:
      inset 0 2px 3px rgba(0,0,0,0.7),
      inset 0 -1px 0 rgba(255,255,255,0.02),
      0 0.5px 0 #0c0c0c,
      0 1px 2px rgba(0,0,0,0.7);
    transition-duration: 50ms;
  }

  .a-btn:focus-visible {
    outline: none;
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.6),
      0 2px 0 #0c0c0c,
      0 0 0 2px rgba(255,255,255,0.15);
  }

  .a-cta {
    background: #232323;
    border-color: rgba(255,255,255,0.09);
    color: rgba(255,255,255,0.82);
    padding: 7px 17px 6px;
  }

  /* per-button imperfection */
  .nav--a .a-btn:nth-child(1) { --r: 0.5deg;  --y: 0px;   --o: 0.95; }
  .nav--a .a-btn:nth-child(2) { --r: -0.4deg; --y: 1.5px; --o: 1;    }
  .nav--a .a-btn:nth-child(3) { --r: 0.7deg;  --y: -1px;  --o: 0.92; }
  .nav--a .a-btn:nth-child(4) { --r: -0.6deg; --y: 2px;   --o: 0.97; }
  .nav--a .a-btn:nth-child(5) { --r: -0.3deg; --y: -0.5px; }


  /* ============================================

     B — PAPER TAG
     Thin cardstock/paper slip, matte surface, slightly
     warmer grey. Flat with a soft contact shadow beneath.

     ============================================ */
  .b-btn {
    all: unset;
    cursor: pointer;
    display: inline-block;
    position: relative;
    font-family: "Inter", sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    line-height: 1;
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    color: rgba(240,235,225,0.7);
    padding: 7px 14px 6px;
    border-radius: 2px;
    background: #1e1d1b;
    border: 1px solid rgba(200,190,170,0.08);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.03),
      0 1px 0 #0d0d0c,
      0 2px 6px rgba(0,0,0,0.7);
    text-shadow: 0.4px 0.3px 0 rgba(0,0,0,0.5);
    transition:
      transform 120ms ease,
      box-shadow 120ms ease,
      color 160ms ease;
    transform:
      rotate(var(--r, 0deg))
      translateY(var(--y, 0px));
    opacity: var(--o, 1);
  }

  /* paper fiber grain */
  .b-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: 0.045;
    background-image:
      repeating-conic-gradient(
        rgba(200,180,140,1) 0% 25%,
        transparent 0% 50%
      );
    background-size: 3px 3px;
    mix-blend-mode: overlay;
  }

  /* faint worn edge — top-left scuff */
  .b-btn::after {
    content: "";
    position: absolute;
    top: 0; left: 0;
    width: 40%;
    height: 1px;
    background: linear-gradient(90deg, rgba(255,255,255,0.05), transparent);
    pointer-events: none;
    border-radius: inherit;
  }

  .b-btn:hover {
    color: rgba(240,235,225,0.88);
    transform: rotate(var(--r, 0deg)) translateY(calc(var(--y, 0px) - 1.5px));
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.04),
      0 2px 0 #0d0d0c,
      0 4px 10px rgba(0,0,0,0.8);
  }

  .b-btn:active {
    color: rgba(240,235,225,0.55);
    transform: rotate(var(--r, 0deg)) translateY(calc(var(--y, 0px) + 1px));
    box-shadow:
      inset 0 1px 1px rgba(0,0,0,0.3),
      0 0.5px 0 #0d0d0c,
      0 1px 2px rgba(0,0,0,0.6);
    transition-duration: 50ms;
  }

  .b-btn:focus-visible {
    outline: none;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.03),
      0 1px 0 #0d0d0c,
      0 0 0 2px rgba(200,190,170,0.15);
  }

  .b-cta {
    background: #262420;
    border-color: rgba(200,190,170,0.12);
    color: rgba(240,235,225,0.85);
    padding: 7px 17px 6px;
  }

  .nav--b .b-btn:nth-child(1) { --r: 0.6deg;  --y: -0.5px; --o: 0.94; }
  .nav--b .b-btn:nth-child(2) { --r: -0.3deg; --y: 2px;    --o: 1;    }
  .nav--b .b-btn:nth-child(3) { --r: 0.9deg;  --y: 0px;    --o: 0.91; }
  .nav--b .b-btn:nth-child(4) { --r: -0.5deg; --y: 1px;    --o: 0.96; }
  .nav--b .b-btn:nth-child(5) { --r: -0.35deg; --y: -1px; }


  /* ============================================

     C — QA / INSPECTION TAG
     Industrial sticker. Slightly rounded, flat dark
     surface with a thin bright-ish border, compact,
     utilitarian. Like an asset tag on server equipment.

     ============================================ */
  .c-btn {
    all: unset;
    cursor: pointer;
    display: inline-block;
    position: relative;
    font-family: "Inter", sans-serif;
    font-size: 9.5px;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    line-height: 1;
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    color: rgba(255,255,255,0.7);
    padding: 6px 12px 5px;
    border-radius: 3px;
    background: #161616;
    border: 1px solid rgba(255,255,255,0.12);
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 1px 0 #090909,
      0 2px 4px rgba(0,0,0,0.7);
    text-shadow: 0.3px 0.2px 0 rgba(0,0,0,0.6);
    transition:
      transform 120ms ease,
      box-shadow 120ms ease,
      color 160ms ease,
      border-color 160ms ease;
    transform:
      rotate(var(--r, 0deg))
      translateY(var(--y, 0px));
    opacity: var(--o, 1);
  }

  /* micro speckle — adhesive residue / wear */
  .c-btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: 0.05;
    background-image:
      radial-gradient(circle, rgba(255,255,255,0.8) 1px, transparent 1px);
    background-size: 5px 5px;
    mix-blend-mode: overlay;
  }

  .c-btn:hover {
    color: rgba(255,255,255,0.88);
    border-color: rgba(255,255,255,0.2);
    transform: rotate(var(--r, 0deg)) translateY(calc(var(--y, 0px) - 1.5px));
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.03),
      0 2px 0 #090909,
      0 4px 8px rgba(0,0,0,0.8);
  }

  .c-btn:active {
    color: rgba(255,255,255,0.5);
    border-color: rgba(255,255,255,0.08);
    transform: rotate(var(--r, 0deg)) translateY(calc(var(--y, 0px) + 1px));
    box-shadow:
      inset 0 1px 2px rgba(0,0,0,0.4),
      0 0.5px 0 #090909,
      0 1px 2px rgba(0,0,0,0.5);
    transition-duration: 50ms;
  }

  .c-btn:focus-visible {
    outline: none;
    box-shadow:
      inset 0 0 0 1px rgba(255,255,255,0.02),
      0 1px 0 #090909,
      0 0 0 2px rgba(255,255,255,0.15);
  }

  .c-cta {
    background: #1d1d1d;
    border-color: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.88);
    padding: 7px 16px 6px;
  }

  .nav--c .c-btn:nth-child(1) { --r: 0.4deg;  --y: 1px;    --o: 0.96; }
  .nav--c .c-btn:nth-child(2) { --r: -0.5deg; --y: -1px;   --o: 1;    }
  .nav--c .c-btn:nth-child(3) { --r: 0.7deg;  --y: 0.5px;  --o: 0.93; }
  .nav--c .c-btn:nth-child(4) { --r: -0.3deg; --y: 2px;    --o: 0.97; }
  .nav--c .c-btn:nth-child(5) { --r: -0.45deg; --y: -0.5px; }

  /* ============================================
     RESPONSIVE
     ============================================ */
  @media (max-width: 680px) {
    .section { padding: 36px 24px 40px; }
    .header { flex-wrap: wrap; }
    .wordmark { margin-right: 0; flex-basis: 100%; margin-bottom: 8px; }
    .nav { gap: 8px; flex-wrap: wrap; }
  }
</style>
</head>
<body>

<!-- ==================== A: LABEL MAKER ==================== -->
<div class="section">
  <div class="section__label">A &mdash; Label Maker (DYMO / embossed plastic strip)</div>
  <div class="header">
    <div class="wordmark">Hayden Baxter</div>
    <nav class="nav nav--a" aria-label="Nav A">
      <button class="a-btn" type="button">Work</button>
      <button class="a-btn" type="button">About</button>
      <button class="a-btn" type="button">Contact</button>
      <button class="a-btn" type="button">Resume</button>
      <button class="a-btn a-cta" type="button">Book a Call</button>
    </nav>
  </div>
</div>

<!-- ==================== B: PAPER TAG ==================== -->
<div class="section">
  <div class="section__label">B &mdash; Paper Tag (cardstock slip, matte, warm tone)</div>
  <div class="header">
    <div class="wordmark">Hayden Baxter</div>
    <nav class="nav nav--b" aria-label="Nav B">
      <button class="b-btn" type="button">Work</button>
      <button class="b-btn" type="button">About</button>
      <button class="b-btn" type="button">Contact</button>
      <button class="b-btn" type="button">Resume</button>
      <button class="b-btn b-cta" type="button">Book a Call</button>
    </nav>
  </div>
</div>

<!-- ==================== C: QA / INSPECTION TAG ==================== -->
<div class="section">
  <div class="section__label">C &mdash; QA Tag (industrial asset sticker, utilitarian)</div>
  <div class="header">
    <div class="wordmark">Hayden Baxter</div>
    <nav class="nav nav--c" aria-label="Nav C">
      <button class="c-btn" type="button">Work</button>
      <button class="c-btn" type="button">About</button>
      <button class="c-btn" type="button">Contact</button>
      <button class="c-btn" type="button">Resume</button>
      <button class="c-btn c-cta" type="button">Book a Call</button>
    </nav>
  </div>
</div>

</body>
</html>
