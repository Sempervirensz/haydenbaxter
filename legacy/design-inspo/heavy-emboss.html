<!--
  STYLE: A5 — HEAVY EMBOSS (DYMO / Embossed Plastic Strip)

  DESIGN SPEC — feed this to any project to recreate the nav:

  VIBE:
    Retro label-maker / DYMO embossed tape. Individual dark buttons
    floating on a black background. Debossed (pressed-in) surface,
    gritty plastic grain, tactile press interactions. Not modern
    neumorphic — institutional, physical, slightly imperfect.

  FONT:
    "DM Mono" (Google Fonts), monospace fallback.
    10px, weight 500, letter-spacing 0.22em, uppercase.

  COLORS:
    Page background: #000000
    Button face: #1c1c1c (flat, no gradient)
    Button border: rgba(255,255,255,0.08) — barely visible edge
    Button text: rgba(255,255,255,0.72) — muted, not bright white
    CTA face: #262626 (slightly lighter)
    CTA border: rgba(255,255,255,0.12)
    CTA text: rgba(255,255,255,0.85)
    Depth edge: #0b0b0b (hard shadow beneath)

  3D / DEPTH:
    - Strong INSET shadow on top: inset 0 2px 4px rgba(0,0,0,0.75)
      (this is the key — makes the surface feel pressed IN, not raised)
    - Faint bottom highlight: inset 0 -1px 0 rgba(255,255,255,0.05)
    - Hard depth edge: 0 3px 0 #0b0b0b (solid dark line beneath = thickness)
    - Soft ambient: 0 4px 7px rgba(0,0,0,0.85)
    - Text shadow: 0 1px 1px rgba(0,0,0,0.7) (ink sitting in the deboss)

  TEXTURE:
    Plastic grain via ::before pseudo-element:
    repeating-conic-gradient at 2px, 8% opacity, mix-blend-mode: overlay

  INTERACTIONS:
    Hover: lift 2px, depth edge grows to 5px, text brightens to 0.88
    Active: press DOWN 2px, depth collapses, deep inset (3px 6px), 40ms snap
    Focus-visible: 2px white ring at 14% opacity (no neon)

  IMPERFECTION:
    Per-button CSS custom properties for micro-misregistration:
    --r (rotation ±0.3–0.7deg), --y (vertical offset ±0–2px),
    --o (opacity 0.93–1.0). Felt, not seen.

  SIZING:
    Padding: 7px 14px 6px (nav), 7px 18px 6px (CTA)
    Border-radius: 3px
    Gap between buttons: 10px

  LAYOUT:
    Flexbox row. Wordmark left (margin-right: auto), nav buttons right.
    Max-width ~1100–1200px centered container. Top padding ~32px.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heavy Emboss Nav</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Inter:wght@400;500&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #000;
    min-height: 100vh;
    color: #fff;
    font-family: "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 48px 0;
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .wordmark {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: rgba(255,255,255,0.9);
    white-space: nowrap;
    margin-right: auto;
  }

  .nav {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ---- BUTTON ---- */
  .btn {
    all: unset;
    cursor: pointer;
    display: inline-block;
    position: relative;
    font-family: "DM Mono", monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    line-height: 1;
    white-space: nowrap;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    color: rgba(255,255,255,0.72);
    padding: 7px 14px 6px;
    border-radius: 3px;
    background: #1c1c1c;
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.75),
      inset 0 -1px 0 rgba(255,255,255,0.05),
      0 3px 0 #0b0b0b,
      0 4px 7px rgba(0,0,0,0.85);
    text-shadow: 0 1px 1px rgba(0,0,0,0.7);
    transition: transform 100ms ease, box-shadow 100ms ease, color 140ms ease;
    transform: rotate(var(--r,0deg)) translateY(var(--y,0px));
    opacity: var(--o,1);
  }

  .btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    pointer-events: none;
    opacity: 0.08;
    background: repeating-conic-gradient(rgba(255,255,255,1) 0% 25%, transparent 0% 50%);
    background-size: 2px 2px;
    mix-blend-mode: overlay;
  }

  .btn:hover {
    color: rgba(255,255,255,0.88);
    transform: rotate(var(--r,0deg)) translateY(calc(var(--y,0px) - 2px));
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.65),
      inset 0 -1px 0 rgba(255,255,255,0.06),
      0 5px 0 #0b0b0b,
      0 6px 10px rgba(0,0,0,0.9);
  }

  .btn:active {
    color: rgba(255,255,255,0.55);
    transform: rotate(var(--r,0deg)) translateY(calc(var(--y,0px) + 2px));
    box-shadow:
      inset 0 3px 6px rgba(0,0,0,0.85),
      0 0 0 #0b0b0b,
      0 1px 2px rgba(0,0,0,0.5);
    transition-duration: 40ms;
  }

  .btn:focus-visible {
    outline: none;
    box-shadow:
      inset 0 2px 4px rgba(0,0,0,0.75),
      0 3px 0 #0b0b0b,
      0 0 0 2px rgba(255,255,255,0.14);
  }

  .btn--cta {
    background: #262626;
    border-color: rgba(255,255,255,0.12);
    color: rgba(255,255,255,0.85);
    padding: 7px 18px 6px;
  }

  /* per-button imperfection */
  .btn:nth-child(1) { --r: 0.5deg;  --y: 0px;    --o: 0.96; }
  .btn:nth-child(2) { --r:-0.4deg;  --y: 1.5px;  --o: 1;    }
  .btn:nth-child(3) { --r: 0.7deg;  --y:-1px;    --o: 0.93; }
  .btn:nth-child(4) { --r:-0.5deg;  --y: 2px;    --o: 0.97; }
  .btn:nth-child(5) { --r:-0.3deg;  --y:-0.5px; }

  /* ---- HERO (context) ---- */
  .hero {
    max-width: 1200px;
    margin: 0 auto;
    padding: 120px 48px 0;
    text-align: center;
  }
  .hero__sub {
    font-size: 11px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    font-weight: 400;
    margin-bottom: 32px;
  }
  .hero__heading {
    font-family: "Playfair Display", Georgia, serif;
    font-weight: 700;
    font-size: clamp(38px, 6.5vw, 80px);
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: #fff;
    max-width: 820px;
    margin: 0 auto;
  }

  @media (max-width: 680px) {
    .header { padding: 24px 24px 0; flex-wrap: wrap; }
    .wordmark { margin-right: 0; flex-basis: 100%; margin-bottom: 8px; }
    .nav { gap: 8px; flex-wrap: wrap; }
    .hero { padding: 80px 24px 0; }
  }
</style>
</head>
<body>

<header class="header">
  <div class="wordmark">Hayden Baxter</div>
  <nav class="nav" aria-label="Main navigation">
    <button class="btn" type="button">Work</button>
    <button class="btn" type="button">About</button>
    <button class="btn" type="button">Contact</button>
    <button class="btn" type="button">Resume</button>
    <button class="btn btn--cta" type="button">Book a Call</button>
  </nav>
</header>

<section class="hero">
  <p class="hero__sub">I'm Hayden &mdash; founder &amp; product builder.</p>
  <h1 class="hero__heading">I build thoughtful products where data, design, and the human experience converge.</h1>
</section>

</body>
</html>
